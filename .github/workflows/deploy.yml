name: Deploy Admin to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the admin folder (update this path if it's different on your server)
            cd /home/ec2-user/evera-admin-new-2 || cd /home/ec2-user/*admin*
            
            # Pull the latest code
            git pull origin main
            
            # Install any new dependencies
            npm install
            
            # Rebuild the React frontend for production
            npm run build
            
            echo "Deployment completed successfully!"
